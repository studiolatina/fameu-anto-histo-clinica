
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { display: grid; grid-template-columns: 220px 1fr 280px; gap: 0; min-height: 600px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
.sidebar { border-right: 0.5px solid var(--color-border-tertiary); padding: 16px 0; }
.sidebar-title { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; padding: 0 16px 8px; }
.nav-group { margin-bottom: 4px; }
.nav-group-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); padding: 6px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.nav-group-title:hover { background: var(--color-background-secondary); }
.nav-item { font-size: 13px; color: var(--color-text-secondary); padding: 5px 16px 5px 28px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.nav-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.nav-item.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.canvas { display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--color-background-tertiary); position: relative; }
.legend { position: absolute; bottom: 16px; left: 16px; display: flex; flex-direction: column; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--color-text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.info-panel { border-left: 0.5px solid var(--color-border-tertiary); padding: 20px; overflow-y: auto; }
.panel-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--color-text-tertiary); font-size: 13px; text-align: center; padding: 40px 20px; }
.panel-header { margin-bottom: 16px; }
.panel-nome-lat { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
.panel-nome-pt { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.panel-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.badge-osso { background: #E1F5EE; color: #085041; }
.badge-processo { background: #EEEDFE; color: #3C3489; }
.badge-forame { background: #FAEEDA; color: #633806; }
.badge-plano { background: #E6F1FB; color: #0C447C; }
.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 14px; }
.section-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.6; }
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.parts-list { display: flex; flex-direction: column; gap: 4px; }
.part-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; padding: 4px 6px; border-radius: 6px; }
.part-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.part-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 14px 0; }
.tab-bar { display: flex; gap: 0; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 16px; }
.tab { font-size: 12px; padding: 8px 12px; cursor: pointer; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
.tab.active { color: var(--color-text-primary); font-weight: 500; border-bottom-color: var(--color-text-primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.future-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--color-background-secondary); color: var(--color-text-tertiary); border: 0.5px solid var(--color-border-tertiary); display: inline-flex; align-items: center; gap: 4px; }

svg .bone-region { cursor: pointer; transition: opacity 0.15s; }
svg .bone-region:hover { opacity: 0.75; }
svg .bone-region.active { opacity: 1; }
svg .bone-region.dimmed { opacity: 0.25; }
</style>

const dados = {

      { nome: 'Face externa', tipo: 'região', cor: '#AFA9EC' },
      { nome: 'Face interna', tipo: 'região', cor: '#AFA9EC' },

      { nome: 'Tuberosidade parietal', tipo: 'processo', cor: '#ED93B1' },

    cor: '#AFA9EC'
  },
  'occipital': {
    lat: 'Os occipitale',
    pt: 'Osso occipital',
    tipo: 'osso plano',
    sistema: 'osteoarticular',
    regiao: 'neurocrânio',
    descricao: 'Osso ímpar que forma a parte posterior e inferior do crânio. Circunda o forame magno, pelo qual passa a medula espinal.',
    articulacoes: ['Osso parietal', 'Osso temporal', 'Osso esfenóide', 'Atlas (C1)'],
    partes: [
      { nome: 'Escama occipital', tipo: 'região', cor: '#F0997B' },
      { nome: 'Côndilo occipital', tipo: 'processo', cor: '#ED93B1' },
      { nome: 'Forame magno', tipo: 'forame', cor: '#EF9F27' },
      { nome: 'Protuberância occipital ext.', tipo: 'processo', cor: '#ED93B1' },
    ],

  },
  'temporal': {

    sistema: 'osteoarticular',
    regiao: 'neurocrânio',
    descricao: 'Osso par situado nas regiões laterais e base do crânio. Abriga o ouvido médio e interno. Articula-se com a mandíbula pela ATM.',

    articulacoes: [],

    ref: ["Gray's Anatomy, cap. 3", "Netter, prancha 9"],
    status: 'revisado',
    cor: '#EF9F27'
  },
  'processo-mastoide': {

let atual = 'frontal';

function getBadgeClass(tipo) {
  if (tipo === 'forame') return 'badge badge-forame';
  if (tipo.includes('processo')) return 'badge badge-processo';
  if (tipo.includes('plano')) return 'badge badge-plano';
  return 'badge badge-osso';
}

function renderPanel(id) {
  const d = dados[id];
  if (!d) return;
  const isProcessoOuForame = d.tipo === 'forame' || d.tipo === 'processo';
  
  let partsHTML = '';
  if (d.partes && d.partes.length > 0) {
    partsHTML = `<div class="section-label">Partes e acidentes</div>
    <div class="parts-list">
      ${d.partes.map(p => `<div class="part-item"><div class="part-dot" style="background:${p.cor}"></div>${p.nome} <span style="font-size:11px;color:var(--color-text-tertiary);margin-left:auto">${p.tipo}</span></div>`).join('')}
    </div>`;
  }

  let artOuInsHTML = '';
  if (!isProcessoOuForame && d.articulacoes && d.articulacoes.length > 0) {
    artOuInsHTML = `<div class="section-label">Articula-se com</div>
    <div class="tag-list">${d.articulacoes.map(a => `<span class="tag">${a}</span>`).join('')}</div>`;
  }
  if (d.inserções && d.inserções.length > 0) {
    artOuInsHTML += `<div class="section-label" style="margin-top:10px">Inserção muscular</div>
    <div class="tag-list">${d.inserções.map(a => `<span class="tag">${a}</span>`).join('')}</div>`;
  }

  document.getElementById('panel-content').innerHTML = `
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(this,'tab-morfologia')">Morfologia</div>
      <div class="tab" onclick="switchTab(this,'tab-histologia')">Histologia</div>
      <div class="tab" onclick="switchTab(this,'tab-clinica')">Clínica</div>
    </div>

    <div class="tab-content active" id="tab-morfologia">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div style="width:12px;height:12px;border-radius:50%;background:${d.cor};flex-shrink:0"></div>
        <div class="panel-nome-lat">${d.lat}</div>
      </div>
      <div class="panel-nome-pt">${d.pt}</div>
      <div class="panel-badges">
        <span class="${getBadgeClass(d.tipo)}">${d.tipo}</span>
        <span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${d.regiao}</span>
        <span class="badge" style="background:${d.status==='revisado'?'#E1F5EE':'#FAEEDA'};color:${d.status==='revisado'?'#085041':'#633806'}">${d.status}</span>
      </div>
      <div class="divider"></div>
      <div class="section-label">Descrição</div>
      <div class="section-text">${d.descricao}</div>
      ${partsHTML ? '<div class="divider"></div>' + partsHTML : ''}
      ${artOuInsHTML ? '<div class="divider"></div>' + artOuInsHTML : ''}
      <div class="divider"></div>
      <div class="section-label">Referências</div>
      <div class="tag-list">${d.ref.map(r => `<span class="tag">${r}</span>`).join('')}</div>
    </div>

    <div class="tab-content" id="tab-histologia">
      <div style="padding: 24px 0; text-align:center">
        <span class="future-badge">Etapa 2 — em desenvolvimento</span>
        <div style="font-size:13px;color:var(--color-text-tertiary);margin-top:12px;line-height:1.6">Caracterização histológica dos tecidos<br>associados a esta estrutura.</div>
      </div>
    </div>

    <div class="tab-content" id="tab-clinica">
      <div style="padding: 24px 0; text-align:center">
        <span class="future-badge">Etapa 4 — em desenvolvimento</span>
        <div style="font-size:13px;color:var(--color-text-tertiary);margin-top:12px;line-height:1.6">Correlações clínicas e casos associados<br>a esta estrutura.</div>
      </div>
    </div>
  `;
}

function switchTab(el, tabId) {
  el.closest('.tab-bar').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

function selectBone(id) {
  atual = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.getElementById('nav-' + id);
  if (nav) nav.classList.add('active');
  document.querySelectorAll('.bone-region').forEach(r => r.classList.remove('active','dimmed'));
  const region = document.getElementById('region-' + id);
  if (region) {
    region.classList.add('active');
    document.querySelectorAll('.bone-region').forEach(r => { if (r !== region) r.classList.add('dimmed'); });
  }
  renderPanel(id);
}
